name: CodexPulse

options:
  bundleIdPrefix: com.buzhi
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_APP_SANDBOX: NO
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  CodexPulse:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buzhi.codexpulse
        PRODUCT_NAME: CodexPulse
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    scheme:
      testTargets:
        - CodexPulseTests

  CodexPulseTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: CodexPulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buzhi.codexpulse.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: ""
        OTHER_LDFLAGS:
          - "$(BUILT_PRODUCTS_DIR)/CodexPulse.app/Contents/MacOS/CodexPulse.debug.dylib"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@loader_path/../../../CodexPulse.app/Contents/MacOS"
